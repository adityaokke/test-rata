version: '3.9'

# ─────────────────────────────────────────────────────────────
#  Healthcare CRM — full stack
#  Run:  docker-compose up --build
# ─────────────────────────────────────────────────────────────

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_chat_data:
  redis_data:

services:

  # ── PostgreSQL — Auth ──────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: crm-postgres-auth
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_AUTH_DB:-auth_db}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_AUTH_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — Chat ──────────────────────────────────────
  postgres-chat:
    image: postgres:16-alpine
    container_name: crm-postgres-chat
    restart: unless-stopped
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_CHAT_DB:-chat_db}
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_CHAT_DB:-chat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

