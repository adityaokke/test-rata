version: '3.9'

# ─────────────────────────────────────────────────────────────
#  Healthcare CRM — docker-compose
#  Run:  docker-compose up --build
# ─────────────────────────────────────────────────────────────

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_auth_data:

services:

  # ── PostgreSQL (Auth DB) ───────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: crm-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-auth_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_AUTH_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

