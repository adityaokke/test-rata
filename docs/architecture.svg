<g >
  <rect x="430" y="510" width="200" height="52" rx="8" stroke-width="0.5" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);"/>
  <text x="530" y="530" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-size:14px;font-weight:500;font-family:ui-sans-serif,system-ui,sans-serif;">Message worker</text>
