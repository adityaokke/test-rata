<g >
  <rect x="180" y="608" width="220" height="52" rx="8" stroke-width="0.5" style="fill:rgb(39, 80, 10);stroke:rgb(151, 196, 89);"/>
  <text x="290" y="628" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192, 221, 151);font-size:14px;font-weight:500;font-family:ui-sans-serif,system-ui,sans-serif;">PostgreSQL</text>
  <text x="290" y="646" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151, 196, 89);font-size:12px;font-family:ui-sans-serif,system-ui,sans-serif;">chat_db · rooms · messages</text>
</g>

<!-- ── Row 6 right: Redis x=430..625 y=578..630 ──────────── -->
<g >
  <rect x="430" y="578" width="195" height="52" rx="8" stroke-width="0.5" style="fill:rgb(99, 56, 6);stroke:rgb(239, 159, 39);"/>
  <text x="527" y="598" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 199, 117);font-size:14px;font-weight:500;font-family:ui-sans-serif,system-ui,sans-serif;">Redis</text>
  <text x="527" y="616" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239, 159, 39);font-size:12px;font-family:ui-sans-serif,system-ui,sans-serif;">seq counter · presence · cache</text>
</g>

<!-- Redis left → up → Chat Service bottom (pub/sub) -->
<path d="M430 604 L410 604 L410 315 L430 315" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="402" y="460" text-anchor="end" dominant-baseline="central" style="fill:rgb(186,117,23);font-size:12px;font-family:ui-sans-serif,system-ui,sans-serif;">pub/sub</text>

<!-- ── Legend ──────────────────────────────────────────────── -->
<rect x="20" y="668" width="210" height="56" rx="6" fill="none" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="125" y="682" text-anchor="middle" dominant-baseline="central" style="fill:rgb(194,192,182);font-size:12px;font-family:ui-sans-serif,system-ui,sans-serif;">Legend</text>
