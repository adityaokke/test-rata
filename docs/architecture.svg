</g>

<!-- Frontend bottom → Gateway top -->
<line x1="340" y1="72" x2="340" y2="136" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- WS: Frontend right → right side → Chat Service top (bidirectional) -->
<path d="M490 46 L610 46 L610 276" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="618" y="172" text-anchor="start" dominant-baseline="central" style="fill:rgb(29,158,117);font-size:12px;font-family:ui-sans-serif,system-ui,sans-serif;">WS</text>

<!-- ── Row 2: Gateway x=190..490, y=136..188 ─────────────── -->
<g >
  <rect x="190" y="136" width="300" height="52" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);"/>
  <text x="340" y="156" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-size:14px;font-weight:500;font-family:ui-sans-serif,system-ui,sans-serif;">Gateway</text>
