    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Row 1: Frontend x=190..490, y=20..72 ──────────────── -->
<g >
  <rect x="190" y="20" width="300" height="52" rx="8" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-size:14px;font-weight:500;font-family:ui-sans-serif,system-ui,sans-serif;">Frontend</text>
