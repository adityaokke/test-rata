<path d="M430 536 L360 536 L360 608" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Worker right → right → down → Redis right -->
<path d="M630 536 L655 536 L655 604 L625 604" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

