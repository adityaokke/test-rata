</g>

<!-- Gateway → Auth -->
<path d="M250 188 L250 226 L150 226 L150 276" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Gateway → Chat -->
<path d="M430 188 L430 226 L530 226 L530 276" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── Row 3: Auth x=50..250 y=276..328, Chat x=430..630 y=276..328 ── -->
<g >
